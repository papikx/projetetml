<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="tictactoe.CSS?v=1.1">
    <script src="../../assets/js/kiosk.js"></script>
</head>

<body>
    <div id="vanta-bg"></div>

    <div class="game">
        <h1>Tic Tac Toe</h1>

        <div class="board" id="board">
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
        </div>

        <div id="status">Tour du joueur 1</div>
        <button onclick="resetGame()">Recommencer</button>
        <button onclick="window.location.href='../game_menu.html'">Retour au menu</button>
    </div>

    <script src="tictactoe.js"></script>
    <script src="../../assets/js/three.r134.min.js"></script>
    <script src="../../assets/js/vanta.net.min.js"></script>
    <script>
        VANTA.NET({
            el: "#vanta-bg",
            mouseControls: true,
            touchControls: true,
            gyroControls: false,
            minHeight: 200.00,
            minWidth: 200.00,
            scale: 1.00,
            scaleMobile: 1.00,
            color: 0x011fac,
            backgroundColor: 0x3c,
            points: 16,
            maxDistance: 20,
            spacing: 17
        })
    </script>
</body>

</html>
